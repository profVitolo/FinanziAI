<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <link rel="stylesheet" href="css/portfolio.css">
	<link rel="stylesheet" href="css/common.css">
		
	<link rel="icon"
		href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 x=%22-.1em%22 font-size=%2290%22>📈</text></svg>"
	>
</head>
<body>
    <header>
		<div class="logo">
			<h1>📈 FinanziAI</h1>
			<p>AI-Assisted Investment Analysis</p>
		</div>
        <h1>Portfolio</h1>

        <div class="nav-links">
			<a href="index.html">🏠 Dashboard</a>
			<a href="transactions.html">💱 Transazioni</a>
		</div>
    </header>
    <main>
        <section>
            <h2>Riepilogo</h2>
            <p>
                Valore Totale:
                <span id="portfolio-value">-</span>
            </p>
            <p>
                Livello di rischio:
                <span id="risk-level">-</span>
            </p>
            <p>
                Maggiore esposizione:
                <span id="largest-position">-</span>
            </p>
        </section>

        <hr>
		
		<section>
			<h2>Cerca Posizioni</h2>
			<input type="text" id="portfolio-filter-symbol" placeholder="AAPL" oninput="handlePortfolioFilter()">
		</section>

		<hr>

        <section>
            <h2>Posizioni</h2>

            <table>
                <thead>
                    <tr>
                        <th>Asset</th>
                        <th>Quantità</th>
                        <th>Prezzo Medio Acquisto</th>
                        <th>Prezzo Attuale Mercato</th>
                        <th>P/L</th>
                    </tr>
                </thead>

                <tbody id="positions-table">
                </tbody>
            </table>
        </section>

        <hr>

        <section>
            <h2>Esposizione</h2>
            <ul id="exposure-list"></ul>
        </section>

        <hr>
    </main>

    <script src="js/portfolio.js"></script>
</body>
</html>
