<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanziAI</title>

    <link rel="stylesheet" href="css/app.css">
	<link rel="stylesheet" href="css/common.css">
		
	<link rel="icon"
		href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 x=%22-.1em%22 font-size=%2290%22>📈</text></svg>"
	>
</head>
<body>
    <header>
		<div class="logo">
			<h1>📈 FinanziAI</h1>
			<p>AI-Assisted Investment Analysis</p>
		</div>
		<h1>DashBoard</h1>
		<div class="nav-links">
			<a href="portfolio.html">💼 Portafoglio</a>
			<a href="transactions.html">💱 Transazioni</a>
		</div>
    </header>

    <main>
        <section>
            <h2>Ricerca Asset</h2>
			<form id="search-form">
				<input type="text" id="symbol-input" placeholder="AAPL, MSFT, BTC-USD...">

				<button id="search-btn">
					Sincronizza Asset
				</button>
			</form>
        </section>

        <hr>

        <section>
            <h2>Portfolio</h2>

            <div id="portfolio-summary">
                <p>
                    Valore totale:
                    <span id="portfolio-value">-</span>
                </p>
                <p>
                    Posizioni:
                    <span id="positions-count">-</span>
                </p>
            </div>

            <a href="portfolio.html">
                Apri Portfolio
            </a>
        </section>

        <hr>

        <section>
            <h2>Watchlist</h2>

            <ul id="watchlist">
            </ul>
        </section>

        <hr>

        <section>
            <h2>API Status</h2>

            <p id="api-status">
                Verifica...
            </p>
        </section>

    </main>
	
	<script src="js/helper.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
