<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanziAI</title>

    <link rel="stylesheet" href="css/app.css">
	<link rel="stylesheet" href="css/common.css">
		
	<link rel="icon"
		href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 x=%22-.1em%22 font-size=%2290%22>📈</text></svg>"
	>
</head>
<body>
    <header>
		<div class="logo">
			<h1>📈 FinanziAI</h1>
			<p>AI-Assisted Investment Analysis</p>
		</div>
		
		<h1 id="page-title"></h1>
        <div class="nav-links"></div>
    </header>

    <main>
        <section>
            <h2>Ricerca Asset</h2>
			<form id="search-form">
				<input type="text" id="symbol-input" placeholder="AAPL, MSFT, BTC-USD...">

				<button id="search-btn">
					Sincronizza Asset
				</button>
			</form>
        </section>

        <hr>

        <section>
			<h2>Portfolio</h2>

			<div id="portfolio-summary">
				<p>
					Valore totale:
					<span id="portfolio-value">-</span>
				</p>

				<p>
					Posizioni:
					<span id="positions-count">-</span>
				</p>

				<p>
					Valutazione:
					<span id="dashboard-evaluation-severity">-</span>
				</p>

				<p>
					Messaggi:
					<span id="dashboard-evaluation-count">0</span>
				</p>
			</div>

			<a href="portfolio.html">
				Apri Portfolio
			</a>
		</section>

        <hr>

	<section>
		<div class="analysis-header">
			<h2>Analisi AI</h2>
			<div class="profile-selector">
				<label for="investor-profile">Profilo Investitore: </label>
				<select id="investor-profile">
					<option value="-">-</option>
				</select>
			</div>
		</div>

		<div id="advisor-history" class="advisor-history"></div>

		<textarea id="advisor-prompt" rows="4" placeholder="Fai una domanda sul tuo portafoglio a FinaziAI..."></textarea>

		<div class="advisor-actions">
			<button id="advisor-send-btn">Invia</button>
			<button id="advisor-reset-btn" type="button">Annulla</button>
		</div>
	</section>

	<hr>

        <section>
            <h2>Watchlist</h2>

            <ul id="watchlist">
            </ul>
        </section>

        <hr>

        <section>
			<div class="footer">
				<div>
					<h2>API Status</h2>
					<p id="api-status">Verifica...</p>
				</div>

				<div class="vaults-container">
					<label for="databases">Vault:</label>

					<select id="databases">
					</select>

					<button id="new-vault-btn">+</button>
					<button id="delete-vault-btn">−</button>				
				</div>
			</div>
		</section>

    </main>
	
	<script src="js/helper.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
